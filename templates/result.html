<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mark Analyzer</title>
    <link rel="stylesheet" href="/static/style.css">
    
</head>
<body>
<div class="main">
    <div class="navbar">
        <a href="/">Home</a>
        <a href="/result">Result</a>
    </div>

<div class="container">
    <h2><u>Student Result</u></h2>
    <p1>Name : {{name}} <span class="faaa">{{grade}}</span></p1></h1>
    <p1>Math : {{mathMark}}</p1>
    <p1>English : {{englishMark}}</p1>
    <p1>Science : {{scienceMark}}</p1>
    <p1>Total : {{Total}}</p1>
    <p1>Avg : {{avg}}</p1>
    <p1>Remark : {{remark}}</p1>
    
<div class="container1" style="background-color: {{color}};">
    <h4>{{status}}</h4>
</div>

</div>



</div>



</body>
</html>
